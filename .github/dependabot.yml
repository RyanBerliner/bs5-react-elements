version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: 21:00
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    reviewers:
      - "ryanberliner"
    target-branch: "master"
    versioning-strategy: increase
    cooldown:
      default-days: 30
